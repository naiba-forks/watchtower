name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Build
        run: CGO_ENABLED=0 go build -o watchtower .
